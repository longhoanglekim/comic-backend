spring.application.name=comic
server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=/comic

spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://localhost:9200}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.session.store-type=none

application.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/comic}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}
application.security.jwt.cookie-name=${JWT_COOKIE_NAME:COMIC_AUTH}
application.security.jwt.cookie-path=${JWT_COOKIE_PATH:/}
application.security.jwt.cookie-secure=${JWT_COOKIE_SECURE:false}
application.security.jwt.cookie-same-site=${JWT_COOKIE_SAME_SITE:Lax}

application.security.otp.expiration-seconds=${OTP_EXPIRATION_SECONDS:300}
application.security.otp.mail.from=${OTP_MAIL_FROM:no-reply@comic.local}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:huugunners@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

application.security.oauth2.redirect-success-url=${OAUTH2_SUCCESS_REDIRECT_URL:http://localhost:3000/oauth2/success}
application.security.oauth2.redirect-failure-url=${OAUTH2_FAILURE_REDIRECT_URL:http://localhost:3000/oauth2/failure}

application.storage.minio.endpoint=${MINIO_ENDPOINT:http://minio:9000}
application.storage.minio.access-key=${MINIO_ACCESS_KEY:admin}
application.storage.minio.secret-key=${MINIO_SECRET_KEY:password123}
application.storage.minio.bucket=${MINIO_BUCKET:comic}
application.storage.s3.public-base-url=${MINIO_PUBLIC_BASE_URL:http://localhost:9000/comic}
application.storage.s3.internal-base-url=${MINIO_INTERNAL_BASE_URL:http://minio:9000/comic}

spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:user}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:password}
application.rabbitmq.manga-queue=${MANGA_QUEUE:manga_processing_queue}
application.rabbitmq.manga-exchange=${MANGA_EXCHANGE:manga_exchange}
application.rabbitmq.manga-routing-key=${MANGA_ROUTING_KEY:manga_routing_key}


spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

logging.level.root=INFO
logging.level.com.example.comic=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# Multipart configuration (support images up to 5MB, which is > 4MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
